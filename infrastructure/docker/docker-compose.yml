version: "3.9"

services:
  zad-ai-engine:
    build:
      context: ../../
      dockerfile: infrastructure/docker/ai.Dockerfile
    container_name: zad-ai-engine
    ports:
      - "8000:8000"
    env_file:
      - ../../services/ai_rag_engine/.env
    restart: unless-stopped
    networks:
      - zad-network

networks:
  zad-network:
    driver: bridge
