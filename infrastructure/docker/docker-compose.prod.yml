version: "3.9"

services:
  zad-ai-engine:
    image: abourida/docker-zad-ai-engine:latest
    container_name: zad-ai-engine
    ports:
      - "8000:8000"
    env_file:
      - ../../services/ai_rag_engine/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - "C:/Users/Shahin Lap/.cache/huggingface:/root/.cache/huggingface"
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - zad-network

  redis:
    image: redis:7-alpine
    container_name: zad-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - zad-network

networks:
  zad-network:
    driver: bridge

volumes:
  redis_data:
