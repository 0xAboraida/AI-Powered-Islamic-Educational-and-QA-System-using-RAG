<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zad-AI RAG Tester</title>
    <!-- Add Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f4f7f6; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .input-group { margin-bottom: 15px; }
        input, select, button { padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; margin-top: 5px; }
        button { background-color: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 15px; }
        button:hover { background-color: #2ecc71; }
        .chat-box { border: 1px solid #ddd; padding: 15px; height: 400px; overflow-y: auto; background: #fafafa; border-radius: 5px; margin-top: 20px; line-height: 1.8; font-size: 16px;}
        .citations-box { margin-top: 20px; padding: 15px; background: #e8f4f8; border-left: 4px solid #3498db; border-radius: 5px; font-size: 14px; }
        .citation-item { margin-bottom: 10px; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
        .spinner { display: none; text-align: center; color: #7f8c8d; font-style: italic; }
        .badge { display: inline-block; padding: 3px 8px; background: #34495e; color: white; border-radius: 12px; font-size: 12px; margin-left: 5px; }
        
        /* Markdown specific styles */
        .chat-box p { margin-top: 0; margin-bottom: 15px; }
        .chat-box ul, .chat-box ol { margin-top: 0; margin-bottom: 15px; padding-right: 20px; }
        .chat-box li { margin-bottom: 8px; }
        .chat-box strong { color: #2c3e50; }
    </style>
</head>
<body>

<div class="container">
    <h1>Zad-AI Stream Tester 🚀</h1>
    
    <div class="input-group">
        <label>السؤال:</label>
        <input type="text" id="queryInput" placeholder="اكتب سؤالك الشرعي هنا..." value="هل آية الوضوء تحمل على التفصيل أم الإجمال؟">
    </div>
    
    <div class="input-group">
        <label>القسم (Domain):</label>
        <select id="domainInput">
            <option value="فقه">فقه</option>
            <option value="العقيدة">العقيدة</option>
            <option value="التفسير">التفسير</option>
            <option value="الحديث">الحديث</option>
            <option value="السيرة">السيرة</option>
            <option value="التاريخ">التاريخ</option>
            <option value="النحو والصرف">النحو والصرف</option>
        </select>
    </div>

    <button onclick="startStream()">إرسال السؤال</button>

    <div class="spinner" id="spinner">جارٍ معالجة السؤال والبحث في المصادر...</div>

    <h3>النصوص الخام (Context Chunks) التي دخلت للنموذج:</h3>
    <div class="citations-box" id="contextBox" style="background: #fff3e0; border-left-color: #f39c12;"></div>

    <h3>الإجابة:</h3>
    <div class="chat-box" id="chatBox"></div>

    <h3>المصادر المقتبسة في الإجابة (Citations):</h3>
    <div class="citations-box" id="citationsBox"></div>
</div>

<script>
    async function startStream() {
        const query = document.getElementById('queryInput').value;
        const domain = document.getElementById('domainInput').value;
        const chatBox = document.getElementById('chatBox');
        const citationsBox = document.getElementById('citationsBox');
        const contextBox = document.getElementById('contextBox');
        const spinner = document.getElementById('spinner');

        chatBox.innerHTML = '';
        citationsBox.innerHTML = '';
        contextBox.innerHTML = '';
        spinner.style.display = 'block';
        
        let accumulatedMarkdown = "";

        try {
            const response = await fetch('http://localhost:8000/api/v1/chat/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query, domain: domain, chat_history: [] })
            });

            if (!response.ok) throw new Error('Network response was not ok');

            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let buffer = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                spinner.style.display = 'none';
                buffer += decoder.decode(value, { stream: true });
                
                let lines = buffer.split('\n');
                buffer = lines.pop(); // Keep the last incomplete line in buffer

                for (let line of lines) {
                    if (line.trim() === '') continue;
                    
                    try {
                        const parsed = JSON.parse(line);
                        
                        if (parsed.type === "chunk") {
                            // Accumulate markdown text and render it to HTML
                            accumulatedMarkdown += parsed.content;
                            chatBox.innerHTML = marked.parse(accumulatedMarkdown);
                            chatBox.scrollTop = chatBox.scrollHeight;
                        } 
                        else if (parsed.type === "context") {
                            parsed.data.forEach(ctx => {
                                contextBox.innerHTML += `
                                    <div class="citation-item">
                                        <div style="margin-bottom: 5px;">
                                            <strong>[${ctx.id}] ${ctx.book_title || 'كتاب غير معروف'}</strong> 
                                        </div>
                                        <div style="font-size: 0.85rem; color: #555; background: #fff; padding: 10px; border-radius: 4px; border: 1px solid #ddd; max-height: 150px; overflow-y: auto;">
                                            ${ctx.content}
                                        </div>
                                    </div>
                                `;
                            });
                        }
                        else if (parsed.type === "citations") {
                            parsed.data.forEach(cite => {
                                citationsBox.innerHTML += `
                                    <div class="citation-item">
                                        <div style="margin-bottom: 5px;">
                                            <strong>[${cite.id}] ${cite.book_title || 'كتاب غير معروف'}</strong> 
                                            <span class="badge" style="background-color: #2c3e50; color: white;">${cite.domain || ''}</span>
                                            ${cite.madhhab ? `<span class="badge" style="background-color: #16a085; color: white;">${cite.madhhab}</span>` : ''}
                                        </div>
                                        <div style="font-size: 0.85rem; color: #555; line-height: 1.6;">
                                            <strong>المؤلف:</strong> ${cite.author || 'غير معروف'} (توفى: ${cite.author_death || '؟'})<br>
                                            <strong>العنوان التفصيلي:</strong> ${cite.hierarchy?.kitab || 'بدون قسم'} ${cite.hierarchy?.sections && cite.hierarchy.sections.length > 0 ? '> ' + cite.hierarchy.sections.join(' > ') : ''}<br>
                                            <strong>المجلد:</strong> ${cite.part || '1'} من ${cite.total_parts || '1'} | <strong>الصفحة:</strong> ${cite.page_id || 'غير معروف'}
                                        </div>
                                        <div style="margin-top: 8px;">
                                            <a href="${cite.source_url}" target="_blank" style="display: inline-block; padding: 4px 10px; background-color: #3498db; color: white; text-decoration: none; border-radius: 4px; font-size: 0.85rem;">🔗 فتح المصدر الأصلي</a>
                                        </div>
                                    </div>
                                `;
                            });
                        }
                        else if (parsed.type === "info") {
                            accumulatedMarkdown += `\n> ℹ️ **ملاحظة:** ${parsed.content}\n\n`;
                            chatBox.innerHTML = marked.parse(accumulatedMarkdown);
                        }
                        else if (parsed.type === "error") {
                            accumulatedMarkdown += `\n> ❌ **خطأ:** ${parsed.content}\n\n`;
                            chatBox.innerHTML = marked.parse(accumulatedMarkdown);
                        }
                    } catch (e) {
                        console.error("Error parsing JSON chunk", e, line);
                    }
                }
            }
        } catch (error) {
            spinner.style.display = 'none';
            chatBox.innerHTML = `<span style="color: red;">Failed to connect to the server. Make sure FastAPI is running.</span>`;
            console.error('Fetch error:', error);
        }
    }
</script>

</body>
</html>
