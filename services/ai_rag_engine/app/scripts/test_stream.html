<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zad-AI RAG Tester</title>
    <!-- Add Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #f4f7f6;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        .input-group {
            margin-bottom: 15px;
        }

        input,
        select,
        button {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            width: 100%;
            box-sizing: border-box;
            margin-top: 5px;
        }

        button {
            background-color: #27ae60;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }

        button:hover {
            background-color: #2ecc71;
        }

        .mic-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
            transition: background 0.3s;
        }

        .mic-btn:hover {
            background-color: #c0392b;
        }
        
        .mic-btn.recording {
            animation: pulse 1s infinite;
            background-color: #c0392b;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .input-row {
            display: flex;
            align-items: center;
        }

        .chat-box {
            border: 1px solid #ddd;
            padding: 15px;
            height: 400px;
            overflow-y: auto;
            background: #fafafa;
            border-radius: 5px;
            margin-top: 20px;
            line-height: 1.8;
            font-size: 16px;
        }

        .citations-box {
            margin-top: 20px;
            padding: 15px;
            background: #e8f4f8;
            border-left: 4px solid #3498db;
            border-radius: 5px;
            font-size: 14px;
        }

        .citation-item {
            margin-bottom: 10px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
        }

        .spinner {
            display: none;
            text-align: center;
            color: #7f8c8d;
            font-style: italic;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            background: #34495e;
            color: white;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 5px;
        }

        /* Markdown specific styles */
        .chat-box p {
            margin-top: 0;
            margin-bottom: 15px;
        }

        .chat-box ul,
        .chat-box ol {
            margin-top: 0;
            margin-bottom: 15px;
            padding-right: 20px;
        }

        .chat-box li {
            margin-bottom: 8px;
        }

        .chat-box strong {
            color: #2c3e50;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Zad-AI Stream Tester 🚀</h1>

        <div class="input-group">
            <label>السؤال:</label>
            <div class="input-row">
                <input type="text" id="queryInput" placeholder="اكتب سؤالك الشرعي هنا..."
                    value="ما هي شروط الصلاة راجح المذهب الحنبلي كما ذكر في كتاب عمده الفقه">
                <button class="mic-btn" id="micBtn" onclick="toggleRecording()" title="تسجيل صوتي">🎤</button>
            </div>
            <div id="recordingStatus" style="font-size: 12px; color: #e74c3c; margin-top: 5px; display: none;">جارٍ التسجيل... اضغط مرة أخرى للإيقاف</div>
        </div>

        <div class="input-group">
            <label>القسم (Domain):</label>
            <select id="domainInput">
                <option value="1">فقه</option>
                <option value="2">العقيدة</option>
                <option value="3">السيرة</option>
                <option value="4">التفسير</option>
                <option value="5">الحديث</option>
                <option value="6">علوم القران</option>
                <option value="7">التاريخ</option>
                <option value="8">علوم اللغه</option>
            </select>
        </div>

        <div class="input-group">
            <label>رقم الجلسة (Session ID):</label>
            <input type="number" id="sessionIdInput" placeholder="أدخل رقم الجلسة لاختبار الذاكرة (اختياري)">
        </div>

        <button onclick="startStream()">إرسال السؤال</button>

        <div class="spinner" id="spinner">جارٍ معالجة السؤال والبحث في المصادر...</div>

        <h3>النصوص الخام (Context Chunks) التي دخلت للنموذج:</h3>
        <div class="citations-box" id="contextBox" style="background: #fff3e0; border-left-color: #f39c12;"></div>

        <h3>الإجابة:</h3>
        <div class="chat-box" id="chatBox"></div>

        <h3>المصادر المقتبسة في الإجابة (Citations):</h3>
        <div class="citations-box" id="citationsBox"></div>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        async function toggleRecording() {
            const micBtn = document.getElementById('micBtn');
            const status = document.getElementById('recordingStatus');
            const queryInput = document.getElementById('queryInput');

            if (isRecording) {
                // Stop recording
                mediaRecorder.stop();
                isRecording = false;
                micBtn.classList.remove('recording');
                status.innerText = "جاري تحويل الصوت إلى نص...";
            } else {
                // Start recording
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = event => {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        
                        // Send to server
                        const formData = new FormData();
                        formData.append("file", audioBlob, "recording.webm");

                        try {
                            const response = await fetch('http://127.0.0.1:8000/api/v1/chat/transcribe', {
                                method: 'POST',
                                body: formData
                            });

                            if (!response.ok) throw new Error('Transcription failed');

                            const result = await response.json();
                            queryInput.value = result.text;
                            status.style.display = 'none';
                        } catch (err) {
                            console.error(err);
                            status.innerText = "فشل في تحويل الصوت";
                            status.style.color = "red";
                        }
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    micBtn.classList.add('recording');
                    status.style.display = 'block';
                    status.innerText = "جارٍ التسجيل... اضغط مرة أخرى للإيقاف";
                    status.style.color = "#e74c3c";
                } catch (err) {
                    console.error("Error accessing microphone:", err);
                    alert("تعذر الوصول إلى الميكروفون. يرجى السماح بالصلاحيات.");
                }
            }
        }
        async function startStream() {
            const query = document.getElementById('queryInput').value;
            const domain = document.getElementById('domainInput').value;
            const sessionIdRaw = document.getElementById('sessionIdInput').value;
            const sessionId = sessionIdRaw ? parseInt(sessionIdRaw) : null;
            
            const chatBox = document.getElementById('chatBox');
            const citationsBox = document.getElementById('citationsBox');
            const contextBox = document.getElementById('contextBox');
            const spinner = document.getElementById('spinner');

            chatBox.innerHTML = '';
            citationsBox.innerHTML = '';
            contextBox.innerHTML = '';
            spinner.style.display = 'block';

            try {
                const response = await fetch('http://127.0.0.1:8000/api/v1/chat/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, domain: parseInt(domain), session_id: sessionId })
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const parsed = await response.json();
                spinner.style.display = 'none';

                // Render answer
                chatBox.innerHTML = marked.parse(parsed.answer);
                chatBox.scrollTop = chatBox.scrollHeight;

                // Render context if exists
                if (parsed.context && parsed.context.length > 0) {
                    parsed.context.forEach(ctx => {
                        contextBox.innerHTML += `
                        <div class="citation-item">
                            <div style="margin-bottom: 5px;">
                                <strong>[${ctx.id}] ${ctx.book_title || 'كتاب غير معروف'}</strong> 
                            </div>
                            <div style="font-size: 0.85rem; color: #555; background: #fff; padding: 10px; border-radius: 4px; border: 1px solid #ddd; max-height: 150px; overflow-y: auto;">
                                ${ctx.content}
                            </div>
                        </div>
                        `;
                    });
                } else {
                    contextBox.innerHTML = "<em>تم تعطيل عرض النصوص (RETURN_CONTEXT_CHUNKS=False)</em>";
                }

                // Render citations
                if (parsed.citations && Object.keys(parsed.citations).length > 0) {
                    Object.entries(parsed.citations).forEach(([citKey, cite]) => {
                        const citId = citKey.split('_')[1] || '?';
                        citationsBox.innerHTML += `
                        <div class="citation-item">
                            <div style="margin-bottom: 5px;">
                                <strong>[${citId}] ${cite.book_title || 'كتاب غير معروف'}</strong> 
                                <span class="badge" style="background-color: #2c3e50; color: white;">${cite.domain || ''}</span>
                                ${cite.madhhab ? `<span class="badge" style="background-color: #16a085; color: white;">${cite.madhhab}</span>` : ''}
                            </div>
                            <div style="font-size: 0.85rem; color: #555; line-height: 1.6;">
                                <strong>المؤلف:</strong> ${cite.author || 'غير معروف'} (توفى: ${cite.author_death || '؟'})<br>
                                <strong>العنوان التفصيلي:</strong> ${cite.hierarchy ? cite.hierarchy : 'بدون قسم'}<br>
                                <strong>المجلد:</strong> ${cite.part || '1'} من ${cite.total_parts || '1'} | <strong>الصفحة:</strong> ${cite.page_id || 'غير معروف'}
                            </div>
                            <div style="margin-top: 8px;">
                                <a href="${cite.source_url}" target="_blank" style="display: inline-block; padding: 4px 10px; background-color: #3498db; color: white; text-decoration: none; border-radius: 4px; font-size: 0.85rem;">🔗 فتح المصدر الأصلي</a>
                            </div>
                        </div>
                        `;
                    });
                }

            } catch (error) {
                spinner.style.display = 'none';
                chatBox.innerHTML = `<span style="color: red;">Failed to connect to the server. Make sure FastAPI is running.</span>`;
                console.error('Fetch error:', error);
            }
        }
    </script>

</body>

</html>
