<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Zad-AI Chat Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f7f6; }
        .container { display: flex; gap: 20px; max-width: 1400px; margin: 0 auto; }
        .main-column { flex: 2; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .side-column { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .box { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-height: 450px; overflow-y: auto; }
        #response { min-height: 200px; background: #eef2f5; padding: 15px; border-radius: 5px; white-space: pre-wrap; font-size: 16px; line-height: 1.8; }
        input, select, button { padding: 10px; font-size: 16px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
        button { background-color: #007bff; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #aaa; cursor: not-allowed; }
        h2, h3 { margin-top: 0; color: #333; }
        .chunk-item { background: #f0f4ff; padding: 10px; border-radius: 5px; margin-bottom: 10px; font-size: 13px; line-height: 1.6; border-right: 4px solid #007bff; }
        .citation-item { background: #f0fff4; padding: 10px; border-radius: 5px; margin-bottom: 10px; font-size: 13px; line-height: 1.6; border-right: 4px solid #28a745; }
        .citation-meta { font-weight: bold; color: #155724; margin-bottom: 5px; }
        .badge { display: inline-block; background: #007bff; color: white; border-radius: 4px; padding: 2px 7px; font-size: 12px; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-column">
            <h2>&#x1F4DA; اختبار Zad-AI (Gemini)</h2>
            <input type="text" id="query" placeholder="اكتب سؤالك هنا...">
            <select id="domain">
                <option value="السيرة">السيرة النبوية</option>
                <option value="فقه">الفقه</option>
                <option value="العقيدة">العقيدة</option>
                <option value="التفسير">التفسير</option>
                <option value="الحديث">الحديث</option>
                <option value="النحو والصرف">النحو والصرف</option>
                <option value="التاريخ">التاريخ</option>
                <option value="الآداب والأخلاق">الآداب والأخلاق</option>
            </select>
            <button id="sendBtn" onclick="sendMessage()">&#x1F4E8; إرسال</button>
            <h3>الإجابة:</h3>
            <div id="response">اكتب سؤالك واضغط إرسال...</div>
        </div>

        <div class="side-column">
            <div class="box">
                <h3>&#x1F4C4; النصوص المستخرجة (Context)</h3>
                <div id="context-box">لم يتم استخراج نصوص بعد...</div>
            </div>
            <div class="box">
                <h3>&#x1F4D6; المصادر والاقتباسات</h3>
                <div id="citations-box">لم يتم توليد اقتباسات بعد...</div>
            </div>
        </div>
    </div>

    <script>
        let isGenerating = false;

        async function sendMessage() {
            if (isGenerating) return;

            const query = document.getElementById("query").value.trim();
            const domain = document.getElementById("domain").value;
            const responseDiv = document.getElementById("response");
            const contextBox = document.getElementById("context-box");
            const citationsBox = document.getElementById("citations-box");
            const sendBtn = document.getElementById("sendBtn");

            if (!query) { responseDiv.innerHTML = "<span style='color:orange'>الرجاء كتابة سؤال أولاً.</span>"; return; }

            responseDiv.innerHTML = "";
            contextBox.innerHTML = "<i>جاري الاسترجاع...</i>";
            citationsBox.innerHTML = "";

            isGenerating = true;
            sendBtn.disabled = true;
            sendBtn.innerText = "جاري الإجابة...";

            try {
                const response = await fetch('/api/v1/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, domain: domain })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.trim() === "") continue;
                        try {
                            const parsed = JSON.parse(line);

                            if (parsed.type === "context") {
                                contextBox.innerHTML = "";
                                parsed.data.forEach(item => {
                                    contextBox.innerHTML += `<div class="chunk-item"><span class="badge">${item.id}</span> ${item.content}</div>`;
                                });
                            } else if (parsed.type === "chunk") {
                                responseDiv.innerHTML += parsed.content;
                            } else if (parsed.type === "citations") {
                                citationsBox.innerHTML = "";
                                parsed.data.forEach(item => {
                                    // Make the title a clickable link if the link exists
                                    const titleHtml = item.link 
                                        ? `<a href="${item.link}" target="_blank" style="color: #155724; text-decoration: underline;">كتاب "${item.book_title}" لـ "${item.author}"</a>`
                                        : `كتاب "${item.book_title}" لـ "${item.author}"`;
                                        
                                    citationsBox.innerHTML += `
                                        <div class="citation-item">
                                            <div class="citation-meta"><span class="badge">${item.id}</span> ${titleHtml}</div>
                                            ${item.volume ? `<div><b>الجزء:</b> ${item.volume}</div>` : ''}
                                            ${item.page ? `<div><b>الصفحة:</b> ${item.page}</div>` : ''}
                                            <hr style="margin:8px 0">
                                            <div>${item.content_snippet}</div>
                                        </div>`;
                                });
                            } else if (parsed.type === "error") {
                                responseDiv.innerHTML = `<span style='color:red'>${parsed.content}</span>`;
                            }
                        } catch (e) {
                            console.error("JSON parse error:", e, "line:", line);
                        }
                    }
                }
            } catch (error) {
                console.error("Fetch error:", error);
                responseDiv.innerHTML = "<span style='color:red'>حدث خطأ أثناء الاتصال بالخادم.</span>";
            } finally {
                isGenerating = false;
                sendBtn.disabled = false;
                sendBtn.innerText = "📨 إرسال";
            }
        }

        document.getElementById("query").addEventListener("keypress", e => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
