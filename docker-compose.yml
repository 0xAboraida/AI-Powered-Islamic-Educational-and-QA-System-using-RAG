version: "3.9"

services:
  zad-ai-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zad-ai-engine
    ports:
      - "8000:8000"
    # ── Environment Variables ──────────────────────────────────
    # DO NOT put secrets here. Use a .env file or server env vars.
    # On local dev: create a .env file next to docker-compose.yml
    # On server: set these as Environment Variables in your hosting platform
    env_file:
      - services/ai_rag_engine/.env
    restart: unless-stopped
